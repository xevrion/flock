<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flock cursor test</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        font-family: system-ui, sans-serif;
        background: #0f0f14;
        color: #e6e6ee;
        overflow: hidden;
        cursor: crosshair;
      }
      #info {
        position: fixed;
        top: 12px;
        left: 12px;
        font-size: 13px;
        line-height: 1.5;
        z-index: 10;
        background: #1a1a22;
        padding: 10px 14px;
        border-radius: 8px;
      }
      #info b {
        color: #7c5cff;
      }
      .cursor {
        position: fixed;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        box-shadow: 0 0 0 2px #0f0f14;
      }
      .cursor .label {
        position: absolute;
        left: 16px;
        top: -4px;
        white-space: nowrap;
        font-size: 12px;
        background: inherit;
        padding: 2px 6px;
        border-radius: 4px;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <div><b>Flock</b> cursor test</div>
      <div>you are <b id="me"></b></div>
      <div>others here: <b id="count">0</b></div>
      <div>mousemoves/sec: <b id="raw">0</b></div>
      <div>cursor msgs/sec: <b id="sent">0</b></div>
      <div style="margin-top: 6px">
        <label><input type="checkbox" id="interp" checked /> interpolate</label>
      </div>
      <div style="margin-top: 6px; opacity: 0.7">open this page in two tabs and move your mouse</div>
    </div>

    <script type="module">
      import {
        FlockClient,
        normalizeCursorPosition,
        createInterpolator,
      } from "../packages/core/dist/index.js";

      // Count how many cursor:move frames actually leave the socket, so the
      // throttle is visible: fast mouse movement still sends a capped rate.
      let sentThisSecond = 0;
      let rawThisSecond = 0;
      const nativeSend = WebSocket.prototype.send;
      WebSocket.prototype.send = function (data) {
        try {
          if (typeof data === "string" && data.includes('"cursor:move"')) sentThisSecond++;
        } catch {}
        return nativeSend.call(this, data);
      };
      setInterval(() => {
        document.getElementById("sent").textContent = String(sentThisSecond);
        document.getElementById("raw").textContent = String(rawThisSecond);
        sentThisSecond = 0;
        rawThisSecond = 0;
      }, 1000);

      const colors = ["#7c5cff", "#ff5c8a", "#5cff9d", "#ffb15c", "#5cd5ff"];
      const myId = "user-" + Math.random().toString(36).slice(2, 7);
      const myColor = colors[Math.floor(Math.random() * colors.length)];
      document.getElementById("me").textContent = myId;

      const client = new FlockClient({ serverUrl: "ws://localhost:8787" });
      const room = client.joinRoom("playground", {
        userId: myId,
        metadata: { name: myId, color: myColor },
      });

      const cursorEls = new Map();
      const countEl = document.getElementById("count");
      const interpToggle = document.getElementById("interp");

      // Last position the server sent for each user, used directly when
      // interpolation is off and as the source of truth for the interpolator.
      const lastPos = new Map();
      const interp = createInterpolator(80);

      function ensureEl(userId, cursor) {
        let el = cursorEls.get(userId);
        if (!el) {
          el = document.createElement("div");
          el.className = "cursor";
          const color = cursor.metadata?.color ?? "#888";
          el.style.background = color;
          const label = document.createElement("span");
          label.className = "label";
          label.textContent = cursor.metadata?.name ?? userId;
          label.style.background = color;
          el.appendChild(label);
          document.body.appendChild(el);
          cursorEls.set(userId, el);
        }
        return el;
      }

      function place(el, pos) {
        el.style.left = pos.x * window.innerWidth + "px";
        el.style.top = pos.y * window.innerHeight + "px";
      }

      function removeCursor(userId) {
        cursorEls.get(userId)?.remove();
        cursorEls.delete(userId);
        lastPos.delete(userId);
        interp.remove(userId);
        countEl.textContent = String(cursorEls.size);
      }

      room.on("cursor:update", (userId, cursor) => {
        const el = ensureEl(userId, cursor);
        lastPos.set(userId, cursor.position);
        interp.push(userId, cursor.position);
        // With interpolation off, snap straight to the received position. The
        // animation loop handles the smoothed case.
        if (!interpToggle.checked) place(el, cursor.position);
        countEl.textContent = String(cursorEls.size);
      });

      room.on("cursor:remove", (userId) => removeCursor(userId));
      room.on("presence:leave", (userId) => removeCursor(userId));

      // Sample the interpolator every frame so cursors glide between the
      // throttled updates. Untick "interpolate" to feel the raw, choppy motion.
      function renderFrame() {
        if (interpToggle.checked) {
          for (const [userId, el] of cursorEls) {
            const pos = interp.sample(userId) ?? lastPos.get(userId);
            if (pos) place(el, pos);
          }
        }
        requestAnimationFrame(renderFrame);
      }
      requestAnimationFrame(renderFrame);

      window.addEventListener("mousemove", (e) => {
        rawThisSecond++;
        const pos = normalizeCursorPosition(
          e.clientX,
          e.clientY,
          window.innerWidth,
          window.innerHeight,
        );
        room.updateCursor(pos);
      });
    </script>
  </body>
</html>
